name: container-smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, tile-ops, nightly]
    container:
      image: tileops-runner:latest
      volumes:
        - /data/ci-cache/pip:/cache/pip
        - /data/ci-cache/wheels:/cache/wheels
        - /data/ci-cache/tilelang:/cache/tilelang
        - /data/ci-cache/triton:/cache/triton
      options: >-
        --gpus device=1
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Basic env check
        run: |
          set -euo pipefail
          python -V
          echo "workspace=${GITHUB_WORKSPACE}"
          pwd
          ls -la
          if ! nvidia-smi; then
            echo "nvidia-smi unavailable"
          fi
          echo "PIP cache mounted?"
          if [ -d /cache/pip ]; then
            ls -la /cache/pip
          else
            echo "/cache/pip missing"
          fi
          echo "Wheels cache mounted?"
          if [ -d /cache/wheels ]; then
            ls -la /cache/wheels
          else
            echo "/cache/wheels missing"
          fi
          echo "TileLang cache mounted?"
          if [ -d /cache/tilelang ]; then
            ls -la /cache/tilelang
          else
            echo "/cache/tilelang missing"
          fi
          echo "Triton cache mounted?"
          if [ -d /cache/triton ]; then
            ls -la /cache/triton
          else
            echo "/cache/triton missing"
          fi
