name: stale-issues

permissions:
  issues: write

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  close-stale-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues with no comments for 4 weeks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d "28 days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Closing issues with no comment activity since: $CUTOFF"

          ISSUES=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --limit 500 \
            --json number \
            --jq '.[].number')

          if [ -z "$ISSUES" ]; then
            echo "No open issues found."
            exit 0
          fi

          for NUMBER in $ISSUES; do
            LAST_COMMENT=$(gh issue view "$NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --json comments \
              --jq '[.comments[].createdAt] | sort | last // empty')

            if [ -z "$LAST_COMMENT" ]; then
              # No comments — fall back to issue creation time
              LAST_COMMENT=$(gh issue view "$NUMBER" \
                --repo "$GITHUB_REPOSITORY" \
                --json createdAt \
                --jq '.createdAt')
            fi

            if [ "$LAST_COMMENT" '<' "$CUTOFF" ]; then
              echo "Closing #$NUMBER (last activity: $LAST_COMMENT)"
              gh issue close "$NUMBER" \
                --repo "$GITHUB_REPOSITORY" \
                --comment "Closed automatically: no comment activity for 4 weeks. Reopen if still relevant."
            fi
          done
