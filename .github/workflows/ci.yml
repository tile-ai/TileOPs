name: CI

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  # Keep only the newest run for the same PR or branch ref.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  select_docs_only:
    if: ${{ github.repository == 'tile-ai/TileOPs' && github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only change
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          docs_only=false
          reason="code-change-default"

          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
            fi

            if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
              reason="missing-base-sha"
            else
              mapfile -t files < <(git diff --name-only "$base" "$head")
              if [[ "${#files[@]}" -gt 0 ]]; then
                docs_only=true
                for f in "${files[@]}"; do
                  [[ -z "$f" ]] && continue
                  if [[ "$f" == docs/* || "$f" == *.md || "$f" == LICENSE* || "$f" == NOTICE* ]]; then
                    continue
                  fi
                  docs_only=false
                  break
                done
                if [[ "$docs_only" == "true" ]]; then
                  reason="docs-only-change"
                else
                  reason="code-change-detected"
                fi
              else
                reason="no-diff-files"
              fi
            fi
          else
            reason="manual-dispatch"
          fi

          echo "docs_only=${docs_only}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "docs_only=${docs_only} (${reason})"

  pre-commit:
    if: ${{ github.repository == 'tile-ai/TileOPs' && github.event_name != 'schedule' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Equivalent to GIT_STRATEGY: fetch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # At least 3.9 to avoid pre-commit-hooks reporting Python version too low

      - name: Run pre-commit
        # Official pre-commit Action, automatically:
        # 1) Install pre-commit
        # 2) Generate virtual environment according to .pre-commit-config.yaml configuration
        # 3) Execute pre-commit run
        uses: pre-commit/action@v3.0.1
        with:
          # Run on all files once, and print diff on failure
          extra_args: --all-files --show-diff-on-failure

  packaging:
    if: ${{ (github.repository == 'tile-ai/TileOPs' && github.event_name == 'schedule') || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, tile-ops, venv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate GPU frequency
        run: |
          set -euo pipefail
          TARGET_CLOCK_MHZ=1830
          RETRIES=5
          SLEEP_SECONDS=2

          if ! command -v nvidia-smi >/dev/null 2>&1; then
            echo "::error::nvidia-smi is not available on this runner."
            exit 1
          fi

          echo "Detected GPUs:"
          nvidia-smi -L

          attempt=1
          while [ "$attempt" -le "$RETRIES" ]; do
            echo "Validation attempt ${attempt}/${RETRIES}"
            mismatch=0
            while IFS=',' read -r gpu_index gpu_name gpu_clock; do
              gpu_index="$(echo "$gpu_index" | xargs)"
              gpu_name="$(echo "$gpu_name" | xargs)"
              gpu_clock="$(echo "$gpu_clock" | xargs)"
              echo "GPU ${gpu_index} (${gpu_name}) clock: ${gpu_clock} MHz"
              if [ "$gpu_clock" != "$TARGET_CLOCK_MHZ" ]; then
                mismatch=1
              fi
            done < <(nvidia-smi --query-gpu=index,name,clocks.current.graphics --format=csv,noheader,nounits)

            if [ "$mismatch" -eq 0 ]; then
              echo "All GPUs locked at ${TARGET_CLOCK_MHZ} MHz."
              break
            fi

            if [ "$attempt" -eq "$RETRIES" ]; then
              echo "::error::GPU frequency validation failed. Expected ${TARGET_CLOCK_MHZ} MHz on all GPUs."
              exit 1
            fi

            sleep "$SLEEP_SECONDS"
            attempt=$((attempt + 1))
          done
        shell: bash

      - name: Create clean virtual environment
        run: |
          set -euo pipefail
          VENV_DIR="tileops_wheel_ci_venv"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"
          echo "Preparing clean venv at ${VENV_PATH}"
          rm -rf "${VENV_PATH}"
          python -m venv "${VENV_PATH}"
          # shellcheck source=/dev/null
          source "${VENV_PATH}/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
        shell: bash

      - name: Install required dependencies
        run: |
          set -euo pipefail
          VENV_DIR="tileops_wheel_ci_venv"
          source "${{ runner.tool_cache }}/${VENV_DIR}/bin/activate"
          pip install build pytest
        shell: bash

      - name: Build wheel package
        run: |
          set -euo pipefail
          VENV_DIR="tileops_wheel_ci_venv"
          source "${{ runner.tool_cache }}/${VENV_DIR}/bin/activate"
          python -m build --wheel
          echo "Build artifacts:"
          ls -lh dist/*.whl
        shell: bash

      - name: Run unit tests against built wheel
        run: |
          set -euo pipefail
          VENV_DIR="tileops_wheel_ci_venv"
          source "${{ runner.tool_cache }}/${VENV_DIR}/bin/activate"
          pip install --force-reinstall dist/*.whl

          # Run the existing tests/ suite while ensuring imports resolve from wheel.
          TMP_TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TMP_TEST_DIR}"' EXIT
          cp -r tests "${TMP_TEST_DIR}/tests"
          unset PYTHONPATH || true

          cd "${TMP_TEST_DIR}"
          python -m pytest -q tests
        shell: bash

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tileops-wheel-${{ github.sha }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14

      - name: Publish wheel to GitHub Release (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          fail_on_unmatched_files: true

      - name: Cleanup wheel venv
        if: ${{ always() }}
        run: |
          set -euo pipefail
          VENV_DIR="tileops_wheel_ci_venv"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"
          echo "Removing venv at: ${VENV_PATH}"
          rm -rf "${VENV_PATH}"
        shell: bash

  tileops_unit_test:
    needs: [select_docs_only]
    # needs: pre-commit
    if: ${{ github.repository == 'tile-ai/TileOPs' && github.event_name != 'schedule' && needs.select_docs_only.outputs.docs_only != 'true' }}
    runs-on: [self-hosted, tile-ops, venv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Equivalent to GIT_STRATEGY: fetch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate GPU frequency
        run: |
          set -euo pipefail
          TARGET_CLOCK_MHZ=1830
          RETRIES=5
          SLEEP_SECONDS=2

          if ! command -v nvidia-smi >/dev/null 2>&1; then
            echo "::error::nvidia-smi is not available on this runner."
            exit 1
          fi

          echo "Detected GPUs:"
          nvidia-smi -L

          attempt=1
          while [ "$attempt" -le "$RETRIES" ]; do
            echo "Validation attempt ${attempt}/${RETRIES}"
            mismatch=0
            while IFS=',' read -r gpu_index gpu_name gpu_clock; do
              gpu_index="$(echo "$gpu_index" | xargs)"
              gpu_name="$(echo "$gpu_name" | xargs)"
              gpu_clock="$(echo "$gpu_clock" | xargs)"
              echo "GPU ${gpu_index} (${gpu_name}) clock: ${gpu_clock} MHz"
              if [ "$gpu_clock" != "$TARGET_CLOCK_MHZ" ]; then
                mismatch=1
              fi
            done < <(nvidia-smi --query-gpu=index,name,clocks.current.graphics --format=csv,noheader,nounits)

            if [ "$mismatch" -eq 0 ]; then
              echo "All GPUs locked at ${TARGET_CLOCK_MHZ} MHz."
              break
            fi

            if [ "$attempt" -eq "$RETRIES" ]; then
              echo "::error::GPU frequency validation failed. Expected ${TARGET_CLOCK_MHZ} MHz on all GPUs."
              exit 1
            fi

            sleep "$SLEEP_SECONDS"
            attempt=$((attempt + 1))
          done
        shell: bash

      - name: Ensure persistent venv and install dependencies
        run: |
          set -e
          VENV_DIR="tileops_release_venv"

          echo "Creating fresh venv at ${{ runner.tool_cache }}/${VENV_DIR}"
          rm -rf "${{ runner.tool_cache }}/${VENV_DIR}"
          python -m venv "${{ runner.tool_cache }}/${VENV_DIR}"
          # shellcheck source=/dev/null
          source "${{ runner.tool_cache }}/${VENV_DIR}/bin/activate"
          python -m pip install --upgrade pip setuptools wheel --no-user
          PIP_NO_BUILD_ISOLATION=1 pip install -e '.[dev]'
        shell: bash

      - name: Run tests
        run: |
          VENV_DIR="tileops_release_venv"
          source "${{ runner.tool_cache }}/${VENV_DIR}/bin/activate"
          export PYTHONPATH="$(pwd):$PYTHONPATH"
          echo "PYTHONPATH=$PYTHONPATH"
          set -o pipefail
          python -m pytest -q tests  | tee tileops_unit_test.log
        shell: bash

      - name: Cleanup venv
        if: ${{ always() }}
        run: |
          set -e
          VENV_DIR="tileops_release_venv"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"
          echo "Removing venv at: ${VENV_PATH}"
          rm -rf "${VENV_PATH}"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()  # Equivalent to when: always
        with:
          name: tileops_unit_test.log
          path: tileops_unit_test.log
          retention-days: 7  # Equivalent to expire_in: 1 week
