name: CI

permissions:
  contents: write
  checks: read

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  # Keep only the newest run for the same PR or branch ref.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check existing CI results for this SHA
        id: check
        run: |
          if [[ "${{ github.event.action }}" != "ready_for_review" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHECKS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[] | select(.name == "pre-commit" or .name == "tileops_test_release") | .conclusion]')
          ALL_SUCCESS=$(echo "$CHECKS" | jq 'all(. == "success")')
          COUNT=$(echo "$CHECKS" | jq 'length')
          if [[ "$ALL_SUCCESS" == "true" && "$COUNT" -ge 2 ]]; then
            echo "CI already passed for SHA $HEAD_SHA — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  detect-test-scope:
    needs: ci-gate
    if: ${{ github.repository == 'tile-ai/TileOPs' && github.event_name != 'schedule' && needs.ci-gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      skip_gpu_smoke: ${{ steps.scope.outputs.skip_gpu_smoke }}
      scope: ${{ steps.scope.outputs.scope }}
      pytest_targets: ${{ steps.scope.outputs.pytest_targets }}
    steps:
      - name: Checkout test files
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            tests/ops

      - name: Determine pytest scope
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          add_target() {
            local target="$1"
            if [[ -z "${seen_targets[$target]:-}" ]]; then
              selected_targets+=("$target")
              seen_targets["$target"]=1
            fi
          }

          scope="full-smoke"
          skip_gpu_smoke="false"
          pytest_targets="tests"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t changed_files < <(
              gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate \
                --jq '.[].filename'
            )

            echo "Changed files (${#changed_files[@]}):"
            printf ' - %s\n' "${changed_files[@]}"

            scope="skip"
            declare -A seen_targets=()
            selected_targets=()

            for path in "${changed_files[@]}"; do
              case "$path" in
                *.md|.github/ISSUE_TEMPLATE/*|.github/pull_request_template.md|.github/workflows/auto-label.yml|.github/workflows/stale-issues.yml)
                  ;;
                tileops/ops/*.py)
                  test_path="tests/ops/test_$(basename "${path%.py}").py"
                  if [[ -f "$test_path" ]]; then
                    add_target "$test_path"
                    if [[ "$scope" == "skip" ]]; then
                      scope="targeted"
                    fi
                  else
                    echo "No direct smoke test mapping for $path; falling back to full smoke."
                    scope="full-smoke"
                    break
                  fi
                  ;;
                tests/ops/test_*.py)
                  add_target "$path"
                  if [[ "$scope" == "skip" ]]; then
                    scope="targeted"
                  fi
                  ;;
                *)
                  echo "Shared or unsupported path $path; falling back to full smoke."
                  scope="full-smoke"
                  break
                  ;;
              esac
            done

            if [[ "$scope" == "skip" ]]; then
              skip_gpu_smoke="true"
              pytest_targets=""
            elif [[ "$scope" == "targeted" ]]; then
              if [[ "${#selected_targets[@]}" -eq 0 ]]; then
                echo "No mapped tests were collected; falling back to full smoke."
                scope="full-smoke"
                pytest_targets="tests"
              else
                pytest_targets="${selected_targets[*]}"
              fi
            fi
          fi

          echo "Resolved CI scope: $scope"
          if [[ "$skip_gpu_smoke" == "true" ]]; then
            echo "GPU smoke job will be skipped."
          else
            echo "Resolved pytest targets: ${pytest_targets:-<none>}"
          fi

          echo "skip_gpu_smoke=$skip_gpu_smoke" >> "$GITHUB_OUTPUT"
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "pytest_targets=$pytest_targets" >> "$GITHUB_OUTPUT"

  pre-commit:
    needs: ci-gate
    if: ${{ github.repository == 'tile-ai/TileOPs' && github.event_name != 'schedule' && needs.ci-gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Shallow clone to reduce network flakiness on self-hosted runners (see #351)
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # At least 3.9 to avoid pre-commit-hooks reporting Python version too low

      - name: Run pre-commit
        # Official pre-commit Action, automatically:
        # 1) Install pre-commit
        # 2) Generate virtual environment according to .pre-commit-config.yaml configuration
        # 3) Execute pre-commit run
        uses: pre-commit/action@v3.0.1
        with:
          # Run on all files once, and print diff on failure
          extra_args: --all-files --show-diff-on-failure

  tileops_test_release:
    needs: [ci-gate, detect-test-scope]
    # needs: pre-commit
    if: ${{ github.repository == 'tile-ai/TileOPs' && github.event_name != 'schedule' && needs.ci-gate.outputs.skip != 'true' && needs.detect-test-scope.outputs.skip_gpu_smoke != 'true' }}
    runs-on: [self-hosted, tile-ops, venv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Shallow clone to reduce network flakiness on self-hosted runners (see #351)
          fetch-depth: 1
          # Use local bare mirror on self-hosted runner to reduce checkout latency
          reference: /home/ci-runner/repo-mirror

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure persistent compile caches
        run: |
          set -euo pipefail

          TILELANG_CACHE_DIR="/home/ci-runner/.tilelang/cache"
          TILELANG_TMP_DIR="${TILELANG_CACHE_DIR}/tmp"
          TRITON_CACHE_DIR="/home/ci-runner/.triton/cache"

          mkdir -p "${TILELANG_CACHE_DIR}" "${TILELANG_TMP_DIR}" "${TRITON_CACHE_DIR}"

          {
            echo "TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR}"
            echo "TILELANG_TMP_DIR=${TILELANG_TMP_DIR}"
            echo "TRITON_CACHE_DIR=${TRITON_CACHE_DIR}"
          } >> "$GITHUB_ENV"

          echo "Configured compile caches:"
          echo "  TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR}"
          echo "  TILELANG_TMP_DIR=${TILELANG_TMP_DIR}"
          echo "  TRITON_CACHE_DIR=${TRITON_CACHE_DIR}"
        shell: bash

      - name: Validate GPU frequency
        run: |
          set -euo pipefail
          TARGET_CLOCK_MHZ=1830
          RETRIES=5
          SLEEP_SECONDS=2

          if ! command -v nvidia-smi >/dev/null 2>&1; then
            echo "::error::nvidia-smi is not available on this runner."
            exit 1
          fi

          echo "Detected GPUs:"
          nvidia-smi -L

          attempt=1
          while [ "$attempt" -le "$RETRIES" ]; do
            echo "Validation attempt ${attempt}/${RETRIES}"
            mismatch=0
            while IFS=',' read -r gpu_index gpu_name gpu_clock; do
              gpu_index="$(echo "$gpu_index" | xargs)"
              gpu_name="$(echo "$gpu_name" | xargs)"
              gpu_clock="$(echo "$gpu_clock" | xargs)"
              echo "GPU ${gpu_index} (${gpu_name}) clock: ${gpu_clock} MHz"
              if [ "$gpu_clock" != "$TARGET_CLOCK_MHZ" ]; then
                mismatch=1
              fi
            done < <(nvidia-smi --query-gpu=index,name,clocks.current.graphics --format=csv,noheader,nounits)

            if [ "$mismatch" -eq 0 ]; then
              echo "All GPUs locked at ${TARGET_CLOCK_MHZ} MHz."
              break
            fi

            if [ "$attempt" -eq "$RETRIES" ]; then
              echo "::error::GPU frequency validation failed. Expected ${TARGET_CLOCK_MHZ} MHz on all GPUs."
              exit 1
            fi

            sleep "$SLEEP_SECONDS"
            attempt=$((attempt + 1))
          done
        shell: bash

      - name: Resolve persistent venv
        run: |
          set -euo pipefail

          VENV_PREFIX="tileops_ci_venv"
          HASH_INPUT="$(
            {
              echo "python=3.11"
              echo "install=PIP_NO_BUILD_ISOLATION=1 pip install -e '.[dev]'"
              sha256sum pyproject.toml
            } | sha256sum | cut -c1-16
          )"
          VENV_DIR="${VENV_PREFIX}_${HASH_INPUT}"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"

          echo "Resolved venv path: ${VENV_PATH}"
          echo "VENV_DIR=${VENV_DIR}" >> "$GITHUB_ENV"
          echo "VENV_PATH=${VENV_PATH}" >> "$GITHUB_ENV"

          if [ -x "${VENV_PATH}/bin/python" ]; then
            echo "Reusing existing venv: ${VENV_PATH}"
            echo "VENV_REUSED=true" >> "$GITHUB_ENV"
          else
            echo "No matching venv found. Will create: ${VENV_PATH}"
            echo "VENV_REUSED=false" >> "$GITHUB_ENV"
          fi
        shell: bash

      - name: Ensure persistent venv and install dependencies
        run: |
          set -euo pipefail
          if [ "${VENV_REUSED}" = "true" ]; then
            echo "Using cached venv at ${VENV_PATH}"
            exit 0
          fi

          echo "Creating fresh venv at ${VENV_PATH}"
          python -m venv "${VENV_PATH}"
          # shellcheck source=/dev/null
          source "${VENV_PATH}/bin/activate"
          python -m pip install --upgrade pip setuptools wheel --no-user
          PIP_NO_BUILD_ISOLATION=1 pip install -e '.[dev]'
        shell: bash

      - name: Run tests
        run: |
          set -euo pipefail
          source "${VENV_PATH}/bin/activate"
          export PYTHONPATH="$(pwd)${PYTHONPATH:+:$PYTHONPATH}"
          echo "PYTHONPATH=$PYTHONPATH"
          python - <<'PY'
          import os

          print("Runtime cache env:")
          for key in ("TILELANG_CACHE_DIR", "TILELANG_TMP_DIR", "TRITON_CACHE_DIR"):
              print(f"{key}={os.environ.get(key)}")
          PY
          set -o pipefail
          TEST_MARK_EXPR="smoke or full"
          TEST_SCOPE="full-smoke"
          PYTEST_TARGETS="tests"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TEST_MARK_EXPR="smoke"
            TEST_SCOPE="${{ needs.detect-test-scope.outputs.scope }}"
            PYTEST_TARGETS="${{ needs.detect-test-scope.outputs.pytest_targets }}"
          fi
          echo "Resolved test scope: ${TEST_SCOPE}"
          echo "Resolved pytest targets: ${PYTEST_TARGETS}"
          read -r -a TARGETS <<< "${PYTEST_TARGETS}"
          echo "Running pytest -m \"${TEST_MARK_EXPR}\" on ${#TARGETS[@]} target(s)"
          python -m pytest -q "${TARGETS[@]}" -m "${TEST_MARK_EXPR}" | tee tileops_test_release.log
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()  # Equivalent to when: always
        with:
          name: tileops_test_release.log
          path: tileops_test_release.log
          retention-days: 7  # Equivalent to expire_in: 1 week
