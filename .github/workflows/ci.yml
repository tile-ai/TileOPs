name: CI

permissions:
  contents: read
  checks: read

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check existing CI results for this SHA
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "pull_request" || "$EVENT_ACTION" != "ready_for_review" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHECKS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[] | select(.name == "pre-commit" or .name == "gitleaks" or .name == "actionlint") | .conclusion]')
          ALL_SUCCESS=$(echo "$CHECKS" | jq 'all(. == "success")')
          COUNT=$(echo "$CHECKS" | jq 'length')
          if [[ "$ALL_SUCCESS" == "true" && "$COUNT" -ge 3 ]]; then
            echo "CI already passed for SHA $HEAD_SHA; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  pre-commit:
    needs: ci-gate
    if: ${{ github.repository == 'tile-ai/TileOPs' && needs.ci-gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure

  gitleaks:
    needs: ci-gate
    if: ${{ github.repository == 'tile-ai/TileOPs' && needs.ci-gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.0"
        run: |
          set -euo pipefail

          install_dir="${RUNNER_TEMP}/bin"
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"

          mkdir -p "$install_dir"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            -o "${RUNNER_TEMP}/${archive}"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "$install_dir" gitleaks
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run gitleaks
        run: gitleaks dir . --redact --no-banner

  actionlint:
    needs: ci-gate
    if: ${{ github.repository == 'tile-ai/TileOPs' && needs.ci-gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.11"
        run: |
          set -euo pipefail

          install_dir="${RUNNER_TEMP}/bin"
          mkdir -p "$install_dir"
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- "$ACTIONLINT_VERSION" "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color
