name: Nightly

permissions: read-all

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    if: ${{ github.repository == 'tile-ai/TileOPs' && (github.event_name == 'schedule' || github.ref == 'refs/heads/main') }}
    timeout-minutes: 90
    runs-on: [self-hosted, tile-ops, venv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure persistent compile caches
        run: |
          set -euo pipefail

          TILELANG_CACHE_DIR="/home/ci-runner/.tilelang/cache"
          TILELANG_TMP_DIR="${TILELANG_CACHE_DIR}/tmp"
          TRITON_CACHE_DIR="/home/ci-runner/.triton/cache"

          mkdir -p "${TILELANG_CACHE_DIR}" "${TILELANG_TMP_DIR}" "${TRITON_CACHE_DIR}"

          {
            echo "TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR}"
            echo "TILELANG_TMP_DIR=${TILELANG_TMP_DIR}"
            echo "TRITON_CACHE_DIR=${TRITON_CACHE_DIR}"
          } >> "$GITHUB_ENV"

          echo "Configured compile caches:"
          echo "  TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR}"
          echo "  TILELANG_TMP_DIR=${TILELANG_TMP_DIR}"
          echo "  TRITON_CACHE_DIR=${TRITON_CACHE_DIR}"
        shell: bash

      - name: Validate GPU frequency
        run: |
          set -euo pipefail
          TARGET_CLOCK_MHZ=1830
          RETRIES=5
          SLEEP_SECONDS=2

          if ! command -v nvidia-smi >/dev/null 2>&1; then
            echo "::error::nvidia-smi is not available on this runner."
            exit 1
          fi

          echo "Detected GPUs:"
          nvidia-smi -L

          attempt=1
          while [ "$attempt" -le "$RETRIES" ]; do
            echo "Validation attempt ${attempt}/${RETRIES}"
            mismatch=0
            while IFS=',' read -r gpu_index gpu_name gpu_clock; do
              gpu_index="$(echo "$gpu_index" | xargs)"
              gpu_name="$(echo "$gpu_name" | xargs)"
              gpu_clock="$(echo "$gpu_clock" | xargs)"
              echo "GPU ${gpu_index} (${gpu_name}) clock: ${gpu_clock} MHz"
              if [ "$gpu_clock" != "$TARGET_CLOCK_MHZ" ]; then
                mismatch=1
              fi
            done < <(nvidia-smi --query-gpu=index,name,clocks.current.graphics --format=csv,noheader,nounits)

            if [ "$mismatch" -eq 0 ]; then
              echo "All GPUs locked at ${TARGET_CLOCK_MHZ} MHz."
              break
            fi

            if [ "$attempt" -eq "$RETRIES" ]; then
              echo "::error::GPU frequency validation failed. Expected ${TARGET_CLOCK_MHZ} MHz on all GPUs."
              exit 1
            fi

            sleep "$SLEEP_SECONDS"
            attempt=$((attempt + 1))
          done
        shell: bash

      - name: Resolve persistent venv
        run: |
          set -euo pipefail

          VENV_PREFIX="tileops_ci_venv"
          HASH_INPUT="$(
            {
              echo "python=3.11"
              echo "install=PIP_NO_BUILD_ISOLATION=1 pip install -e '.[dev]'"
              sha256sum pyproject.toml
            } | sha256sum | cut -c1-16
          )"
          VENV_DIR="${VENV_PREFIX}_${HASH_INPUT}"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"

          echo "Resolved venv path: ${VENV_PATH}"
          echo "VENV_DIR=${VENV_DIR}" >> "$GITHUB_ENV"
          echo "VENV_PATH=${VENV_PATH}" >> "$GITHUB_ENV"

          if [ -x "${VENV_PATH}/bin/python" ]; then
            echo "Reusing existing venv: ${VENV_PATH}"
            echo "VENV_REUSED=true" >> "$GITHUB_ENV"
          else
            echo "No matching venv found. Will create: ${VENV_PATH}"
            echo "VENV_REUSED=false" >> "$GITHUB_ENV"

            for old_venv in "${{ runner.tool_cache }}/${VENV_PREFIX}"_*; do
              if [ ! -d "${old_venv}" ]; then
                continue
              fi
              if [ "${old_venv}" = "${VENV_PATH}" ]; then
                continue
              fi
              echo "Removing stale venv: ${old_venv}"
              rm -rf "${old_venv}"
            done
          fi
        shell: bash

      - name: Ensure persistent venv and install dependencies
        run: |
          set -euo pipefail
          if [ "${VENV_REUSED}" = "true" ]; then
            echo "Using cached venv at ${VENV_PATH}"
            exit 0
          fi

          echo "Creating fresh venv at ${VENV_PATH}"
          python -m venv "${VENV_PATH}"
          # shellcheck source=/dev/null
          source "${VENV_PATH}/bin/activate"
          python -m pip install --upgrade pip setuptools wheel --no-user
          PIP_NO_BUILD_ISOLATION=1 pip install -e '.[dev]'
        shell: bash

      - name: Run benchmark ops
        continue-on-error: true
        run: |
          set -euo pipefail
          source "${VENV_PATH}/bin/activate"
          export PYTHONPATH="$(pwd)${PYTHONPATH:+:$PYTHONPATH}"
          echo "PYTHONPATH=$PYTHONPATH"
          python - <<'PY'
          import os

          print("Runtime cache env:")
          for key in ("TILELANG_CACHE_DIR", "TILELANG_TMP_DIR", "TRITON_CACHE_DIR"):
              print(f"{key}={os.environ.get(key)}")
          PY
          set -o pipefail
          python -m pytest -q benchmarks/ops --junit-xml=bench_results.xml | tee tileops_benchmarks.log
        shell: bash

      - name: Benchmark step summary
        if: ${{ always() }}
        run: |
          {
            echo "## Benchmark Results"
            echo ""
            if [ ! -f bench_results.xml ]; then
              echo "No bench_results.xml found — benchmark step did not produce output."
            else
              TOTAL=0; FAILURES=0; ERRORS=0; SKIPPED=0
              while IFS= read -r _line; do
                if [[ "$_line" == *'<testsuite '* && "$_line" != *'<testsuites'* ]]; then
                  [[ "$_line" =~ [[:space:]]tests=\"([0-9]+)\" ]]    && TOTAL=$((TOTAL + ${BASH_REMATCH[1]}))
                  [[ "$_line" =~ [[:space:]]failures=\"([0-9]+)\" ]] && FAILURES=$((FAILURES + ${BASH_REMATCH[1]}))
                  [[ "$_line" =~ [[:space:]]errors=\"([0-9]+)\" ]]   && ERRORS=$((ERRORS + ${BASH_REMATCH[1]}))
                  [[ "$_line" =~ [[:space:]]skipped=\"([0-9]+)\" ]]  && SKIPPED=$((SKIPPED + ${BASH_REMATCH[1]}))
                fi
              done < bench_results.xml
              PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
              if [ "$((FAILURES + ERRORS))" -eq 0 ]; then
                echo "✅ All passed"
              else
                echo "❌ Failures detected"
              fi
              echo ""
              printf "| Tests | Passed | Failed | Errors | Skipped |\n"
              printf "|-------|--------|--------|--------|----------|\n"
              printf "| %s | %s | %s | %s | %s |\n" "$TOTAL" "$PASSED" "$FAILURES" "$ERRORS" "$SKIPPED"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Merge benchmark profile summary
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ -f profile_run.log ]; then
            {
              echo
              echo "===== profile_run.log summary ====="
              cat profile_run.log
            } >> tileops_benchmarks.log
          else
            echo "::warning::profile_run.log not found; benchmark may have failed partially" >> tileops_benchmarks.log
          fi
        shell: bash

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: tileops_benchmark_${{ github.run_id }}
          path: |
            tileops_benchmarks.log
            bench_results.xml
          if-no-files-found: warn
          retention-days: 14

  op_test:
    if: ${{ always() && github.repository == 'tile-ai/TileOPs' && (github.event_name == 'schedule' || github.ref == 'refs/heads/main') }}
    needs: [benchmark]
    timeout-minutes: 180
    runs-on: [self-hosted, tile-ops, venv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure persistent venv and install dependencies
        run: |
          set -euo pipefail
          VENV_DIR="tileops_op_test_venv"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"

          echo "Creating fresh venv at ${VENV_PATH}"
          rm -rf "${VENV_PATH}"
          python -m venv "${VENV_PATH}"
          # shellcheck source=/dev/null
          source "${VENV_PATH}/bin/activate"
          python -m pip install --upgrade pip setuptools wheel --no-user
          PIP_NO_BUILD_ISOLATION=1 pip install -e '.[dev]'
        shell: bash

      - name: Run full op tests
        continue-on-error: true
        run: |
          set -euo pipefail
          VENV_DIR="tileops_op_test_venv"
          source "${{ runner.tool_cache }}/${VENV_DIR}/bin/activate"
          export PYTHONPATH="$(pwd)${PYTHONPATH:+:$PYTHONPATH}"
          echo "PYTHONPATH=$PYTHONPATH"
          set -o pipefail
          python -m pytest tests/ -v --tb=short --junit-xml=test_results.xml | tee tileops_op_test.log
        shell: bash

      - name: Cleanup venv
        if: ${{ always() }}
        run: |
          set -euo pipefail
          VENV_DIR="tileops_op_test_venv"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"
          echo "Removing venv at: ${VENV_PATH}"
          rm -rf "${VENV_PATH}"
        shell: bash

      - name: Upload op test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: tileops_op_test_${{ github.run_id }}
          path: |
            test_results.xml
            tileops_op_test.log
          if-no-files-found: warn
          retention-days: 14

  packaging:
    if: ${{ always() && github.repository == 'tile-ai/TileOPs' && (github.event_name == 'schedule' || github.ref == 'refs/heads/main') }}
    needs: [op_test]
    permissions:
      contents: write
    runs-on: [self-hosted, tile-ops, venv]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure persistent compile caches
        run: |
          set -euo pipefail

          TILELANG_CACHE_DIR="/home/ci-runner/.tilelang/cache"
          TILELANG_TMP_DIR="${TILELANG_CACHE_DIR}/tmp"
          TRITON_CACHE_DIR="/home/ci-runner/.triton/cache"

          mkdir -p "${TILELANG_CACHE_DIR}" "${TILELANG_TMP_DIR}" "${TRITON_CACHE_DIR}"

          {
            echo "TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR}"
            echo "TILELANG_TMP_DIR=${TILELANG_TMP_DIR}"
            echo "TRITON_CACHE_DIR=${TRITON_CACHE_DIR}"
          } >> "$GITHUB_ENV"

          echo "Configured compile caches:"
          echo "  TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR}"
          echo "  TILELANG_TMP_DIR=${TILELANG_TMP_DIR}"
          echo "  TRITON_CACHE_DIR=${TRITON_CACHE_DIR}"
        shell: bash

      - name: Validate GPU frequency
        run: |
          set -euo pipefail
          TARGET_CLOCK_MHZ=1830
          RETRIES=5
          SLEEP_SECONDS=2

          if ! command -v nvidia-smi >/dev/null 2>&1; then
            echo "::error::nvidia-smi is not available on this runner."
            exit 1
          fi

          echo "Detected GPUs:"
          nvidia-smi -L

          attempt=1
          while [ "$attempt" -le "$RETRIES" ]; do
            echo "Validation attempt ${attempt}/${RETRIES}"
            mismatch=0
            while IFS=',' read -r gpu_index gpu_name gpu_clock; do
              gpu_index="$(echo "$gpu_index" | xargs)"
              gpu_name="$(echo "$gpu_name" | xargs)"
              gpu_clock="$(echo "$gpu_clock" | xargs)"
              echo "GPU ${gpu_index} (${gpu_name}) clock: ${gpu_clock} MHz"
              if [ "$gpu_clock" != "$TARGET_CLOCK_MHZ" ]; then
                mismatch=1
              fi
            done < <(nvidia-smi --query-gpu=index,name,clocks.current.graphics --format=csv,noheader,nounits)

            if [ "$mismatch" -eq 0 ]; then
              echo "All GPUs locked at ${TARGET_CLOCK_MHZ} MHz."
              break
            fi

            if [ "$attempt" -eq "$RETRIES" ]; then
              echo "::error::GPU frequency validation failed. Expected ${TARGET_CLOCK_MHZ} MHz on all GPUs."
              exit 1
            fi

            sleep "$SLEEP_SECONDS"
            attempt=$((attempt + 1))
          done
        shell: bash

      - name: Resolve persistent venv
        run: |
          set -euo pipefail

          VENV_PREFIX="tileops_packaging_venv"
          HASH_INPUT="$(
            {
              echo "python=3.11"
              echo "install=pip install build pytest"
              sha256sum pyproject.toml
            } | sha256sum | cut -c1-16
          )"
          VENV_DIR="${VENV_PREFIX}_${HASH_INPUT}"
          VENV_PATH="${{ runner.tool_cache }}/${VENV_DIR}"

          echo "Resolved venv path: ${VENV_PATH}"
          echo "VENV_DIR=${VENV_DIR}" >> "$GITHUB_ENV"
          echo "VENV_PATH=${VENV_PATH}" >> "$GITHUB_ENV"

          if [ -x "${VENV_PATH}/bin/python" ]; then
            echo "Reusing existing venv: ${VENV_PATH}"
            echo "VENV_REUSED=true" >> "$GITHUB_ENV"
          else
            echo "No matching venv found. Will create: ${VENV_PATH}"
            echo "VENV_REUSED=false" >> "$GITHUB_ENV"

            for old_venv in "${{ runner.tool_cache }}/${VENV_PREFIX}"_*; do
              if [ ! -d "${old_venv}" ]; then
                continue
              fi
              if [ "${old_venv}" = "${VENV_PATH}" ]; then
                continue
              fi
              echo "Removing stale venv: ${old_venv}"
              rm -rf "${old_venv}"
            done
          fi
        shell: bash

      - name: Create clean virtual environment
        run: |
          set -euo pipefail
          if [ "${VENV_REUSED}" = "true" ]; then
            echo "Using cached venv at ${VENV_PATH}"
            exit 0
          fi

          echo "Preparing clean venv at ${VENV_PATH}"
          python -m venv "${VENV_PATH}"
          # shellcheck source=/dev/null
          source "${VENV_PATH}/bin/activate"
          python -m pip install --upgrade pip setuptools wheel --no-user
          PIP_NO_BUILD_ISOLATION=1 pip install -e '.[dev]'
        shell: bash

      - name: Install required dependencies
        run: |
          set -euo pipefail
          source "${VENV_PATH}/bin/activate"
          if [ "${VENV_REUSED}" = "true" ]; then
            echo "Cached packaging venv already prepared at ${VENV_PATH}"
            exit 0
          fi
          echo "Packaging dependencies already installed via .[dev]"
        shell: bash

      - name: Build wheel package
        run: |
          set -euo pipefail
          source "${VENV_PATH}/bin/activate"
          python -m build --wheel
          echo "Build artifacts:"
          ls -lh dist/*.whl
        shell: bash

      - name: Run unit tests against built wheel
        run: |
          set -euo pipefail
          source "${VENV_PATH}/bin/activate"
          pip install --force-reinstall dist/*.whl

          TMP_TEST_DIR="$(mktemp -d)"
          trap 'rm -rf "${TMP_TEST_DIR}"' EXIT
          cp -r tests "${TMP_TEST_DIR}/tests"
          unset PYTHONPATH || true

          cd "${TMP_TEST_DIR}"
          python - <<'PY'
          import os

          print("Runtime cache env:")
          for key in ("TILELANG_CACHE_DIR", "TILELANG_TMP_DIR", "TRITON_CACHE_DIR"):
              print(f"{key}={os.environ.get(key)}")
          PY
          python -m pytest -q tests -m "smoke or full or nightly"
        shell: bash

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tileops-wheel-${{ github.sha }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14

      - name: Publish wheel to GitHub Release (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          fail_on_unmatched_files: true
