name: Nightly

permissions: read-all

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# All nightly jobs run on the host-based runner (label: nightly) and launch
# work inside the local tileops-runner:latest Docker image via `docker run`.
# Persistent caches are mounted from /data/ci-cache/ on the host.
# ---------------------------------------------------------------------------

jobs:
  # =========================================================================
  # Phase 1 — Warm the kernel compilation cache
  # =========================================================================
  cache-warmup:
    if: ${{ github.repository == 'tile-ai/TileOPs' && (github.event_name == 'schedule' || github.ref == 'refs/heads/main') }}
    timeout-minutes: 60
    runs-on: [self-hosted, tile-ops, nightly]
    steps:
      - name: Fix workspace ownership
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            --entrypoint chown \
            tileops-runner:latest \
            -R "$(id -u):$(id -g)" /workspace

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warm kernel compilation cache
        continue-on-error: true
        run: |
          docker run --rm \
            --gpus '"device=1"' \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v /data/ci-cache/tilelang:/cache/tilelang \
            -v /data/ci-cache/triton:/cache/triton \
            -v /data/ci-cache/pip:/cache/pip \
            -v /data/ci-cache/wheels:/cache/wheels \
            -e TILELANG_CACHE_DIR=/cache/tilelang \
            -e TILELANG_TMP_DIR=/cache/tilelang/tmp \
            -e TRITON_CACHE_DIR=/cache/triton \
            -e PIP_CACHE_DIR=/cache/pip \
            -e WHEEL_DIR=/cache/wheels \
            -e MAX_JOBS=64 \
            -w /workspace \
            --entrypoint bash \
            tileops-runner:latest \
            -c '
              set -euo pipefail
              mkdir -p "${TILELANG_CACHE_DIR}" "${TILELANG_TMP_DIR}" "${TRITON_CACHE_DIR}" "${PIP_CACHE_DIR}" "${WHEEL_DIR}"

              PIP_NO_BUILD_ISOLATION=1 pip install -e ".[dev]"

              export PYTHONPATH="/workspace${PYTHONPATH:+:$PYTHONPATH}"
              echo "Starting kernel cache warmup..."
              python scripts/warmup_kernel_cache.py --max-workers 64 -n 16
            '
        shell: bash

  # =========================================================================
  # Phase 2 — Benchmark (exclusive GPU access for accurate profiling)
  # =========================================================================
  benchmark:
    if: ${{ always() && github.repository == 'tile-ai/TileOPs' && (github.event_name == 'schedule' || github.ref == 'refs/heads/main') }}
    needs: [cache-warmup]
    timeout-minutes: 120
    runs-on: [self-hosted, tile-ops, nightly]
    steps:
      - name: Fix workspace ownership
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            --entrypoint chown \
            tileops-runner:latest \
            -R "$(id -u):$(id -g)" /workspace

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run benchmark ops
        id: benchmark_tests
        continue-on-error: true
        run: |
          docker run --rm \
            --gpus '"device=1"' \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v /data/ci-cache/tilelang:/cache/tilelang \
            -v /data/ci-cache/triton:/cache/triton \
            -v /data/ci-cache/pip:/cache/pip \
            -v /data/ci-cache/wheels:/cache/wheels \
            -e TILELANG_CACHE_DIR=/cache/tilelang \
            -e TILELANG_TMP_DIR=/cache/tilelang/tmp \
            -e TRITON_CACHE_DIR=/cache/triton \
            -e PIP_CACHE_DIR=/cache/pip \
            -e WHEEL_DIR=/cache/wheels \
            -e MAX_JOBS=64 \
            -w /workspace \
            --entrypoint bash \
            tileops-runner:latest \
            -c '
              set -euo pipefail
              mkdir -p "${TILELANG_CACHE_DIR}" "${TILELANG_TMP_DIR}" "${TRITON_CACHE_DIR}" "${PIP_CACHE_DIR}" "${WHEEL_DIR}"

              # Validate GPU frequency
              TARGET_CLOCK_MHZ=1830
              RETRIES=5
              nvidia-smi -L
              for i in $(seq 1 $RETRIES); do
                gpu_clock=$(nvidia-smi --query-gpu=clocks.current.graphics --format=csv,noheader,nounits | xargs)
                echo "GPU clock: ${gpu_clock} MHz (attempt ${i}/${RETRIES})"
                if [ "$gpu_clock" = "$TARGET_CLOCK_MHZ" ]; then break; fi
                if [ "$i" -eq "$RETRIES" ]; then
                  echo "::error::GPU frequency validation failed. Expected ${TARGET_CLOCK_MHZ} MHz."
                  exit 1
                fi
                sleep 2
              done

              PIP_NO_BUILD_ISOLATION=1 pip install -e ".[dev]"

              export PYTHONPATH="/workspace${PYTHONPATH:+:$PYTHONPATH}"
              echo "Runtime cache env:"
              echo "TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR:-}"
              echo "TILELANG_TMP_DIR=${TILELANG_TMP_DIR:-}"
              echo "TRITON_CACHE_DIR=${TRITON_CACHE_DIR:-}"

              set -o pipefail
              python -m pytest -q benchmarks/ops --junit-xml=bench_results.xml | tee tileops_benchmarks.log

              if [ -f profile_run.log ]; then
                { echo; echo "===== profile_run.log summary ====="; cat profile_run.log; } >> tileops_benchmarks.log
              else
                echo "::warning::profile_run.log not found; benchmark may have failed partially" >> tileops_benchmarks.log
              fi
            '
        shell: bash

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: tileops_benchmark_${{ github.run_id }}
          path: |
            tileops_benchmarks.log
            bench_results.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Fail benchmark job if pytest failed
        if: ${{ always() && steps.benchmark_tests.outcome == 'failure' }}
        run: exit 1
        shell: bash

  # =========================================================================
  # Phase 3 — Op correctness tests (serial after benchmark for GPU exclusivity)
  # =========================================================================
  op_test:
    if: ${{ always() && github.repository == 'tile-ai/TileOPs' && (github.event_name == 'schedule' || github.ref == 'refs/heads/main') }}
    needs: [benchmark]
    timeout-minutes: 180
    runs-on: [self-hosted, tile-ops, nightly]
    steps:
      - name: Fix workspace ownership
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            --entrypoint chown \
            tileops-runner:latest \
            -R "$(id -u):$(id -g)" /workspace

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run full op tests
        id: op_tests
        continue-on-error: true
        run: |
          docker run --rm \
            --gpus '"device=1"' \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v /data/ci-cache/tilelang:/cache/tilelang \
            -v /data/ci-cache/triton:/cache/triton \
            -v /data/ci-cache/pip:/cache/pip \
            -v /data/ci-cache/wheels:/cache/wheels \
            -e TILELANG_CACHE_DIR=/cache/tilelang \
            -e TILELANG_TMP_DIR=/cache/tilelang/tmp \
            -e TRITON_CACHE_DIR=/cache/triton \
            -e PIP_CACHE_DIR=/cache/pip \
            -e WHEEL_DIR=/cache/wheels \
            -w /workspace \
            --entrypoint bash \
            tileops-runner:latest \
            -c '
              set -euo pipefail
              mkdir -p "${TILELANG_CACHE_DIR}" "${TILELANG_TMP_DIR}" "${TRITON_CACHE_DIR}" "${PIP_CACHE_DIR}" "${WHEEL_DIR}"

              PIP_NO_BUILD_ISOLATION=1 pip install -e ".[dev]"

              export PYTHONPATH="/workspace${PYTHONPATH:+:$PYTHONPATH}"
              echo "Runtime cache env:"
              echo "TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR:-}"
              echo "TILELANG_TMP_DIR=${TILELANG_TMP_DIR:-}"
              echo "TRITON_CACHE_DIR=${TRITON_CACHE_DIR:-}"

              set -o pipefail
              python -m pytest tests/ -v --tb=short --junit-xml=test_results.xml | tee tileops_op_test.log
            '
        shell: bash

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        if: ${{ always() }}
        with:
          name: tileops_benchmark_${{ github.run_id }}
        continue-on-error: true

      - name: Resolve previous perf history artifact
        id: perf_history_source
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflowId = "nightly.yml";
            const currentRunId = context.runId;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: workflowId,
                branch: "main",
                status: "completed",
                per_page: 100,
              },
            );

            for (const run of runs) {
              if (run.id === currentRunId || run.conclusion !== "success") {
                continue;
              }

              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                },
              );

              const artifact = artifacts.find(
                (candidate) =>
                  !candidate.expired && candidate.name === "tileops_perf_history",
              );
              if (!artifact) {
                continue;
              }

              core.info(
                `Using perf history artifact from run ${run.id} (${run.html_url})`,
              );
              core.setOutput("run_id", String(run.id));
              return;
            }

            core.info("No previous perf history artifact found; nightly report will start a new history baseline.");

      - name: Download previous perf history
        uses: actions/download-artifact@v4
        if: ${{ always() && steps.perf_history_source.outputs.run_id != '' }}
        with:
          name: tileops_perf_history
          path: .perf_history
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.perf_history_source.outputs.run_id }}

      - name: Generate nightly report
        if: ${{ always() }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            --entrypoint bash \
            tileops-runner:latest \
            -c '
              set -euo pipefail
              pip install --no-deps -e . 2>/dev/null
              export PYTHONPATH="/workspace${PYTHONPATH:+:$PYTHONPATH}"

              HISTORY_FLAG=""
              if [ -f .perf_history/perf_history.json ]; then
                HISTORY_FLAG="--history .perf_history/perf_history.json"
              fi

              python scripts/nightly_report.py \
                --test-xml test_results.xml \
                --bench-xml bench_results.xml \
                ${HISTORY_FLAG} \
                --output nightly_report.md \
                --history-out perf_history.json \
                || echo "::warning::nightly_report.py failed"
            '
        shell: bash

      - name: Post nightly report to step summary
        if: ${{ always() && hashFiles('nightly_report.md') != '' }}
        run: cat nightly_report.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Upload op test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: tileops_op_test_${{ github.run_id }}
          path: |
            test_results.xml
            tileops_op_test.log
            nightly_report.md
          if-no-files-found: warn
          retention-days: 14

      - name: Upload perf history
        uses: actions/upload-artifact@v4
        if: ${{ always() && hashFiles('perf_history.json') != '' }}
        with:
          name: tileops_perf_history
          path: perf_history.json
          overwrite: true
          retention-days: 14

      - name: Fail op test job if pytest failed
        if: ${{ always() && steps.op_tests.outcome == 'failure' }}
        run: exit 1
        shell: bash

  # =========================================================================
  # Phase 4 — Packaging and smoke test
  # =========================================================================
  packaging:
    if: ${{ always() && github.repository == 'tile-ai/TileOPs' && (github.event_name == 'schedule' || github.ref == 'refs/heads/main') }}
    needs: [op_test]
    permissions:
      contents: write
    runs-on: [self-hosted, tile-ops, nightly]
    steps:
      - name: Fix workspace ownership
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            --entrypoint chown \
            tileops-runner:latest \
            -R "$(id -u):$(id -g)" /workspace

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test wheel package
        run: |
          docker run --rm \
            --gpus '"device=1"' \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v /data/ci-cache/tilelang:/cache/tilelang \
            -v /data/ci-cache/triton:/cache/triton \
            -e TILELANG_CACHE_DIR=/cache/tilelang \
            -e TILELANG_TMP_DIR=/cache/tilelang/tmp \
            -e TRITON_CACHE_DIR=/cache/triton \
            -w /workspace \
            --entrypoint bash \
            tileops-runner:latest \
            -c '
              set -euo pipefail
              mkdir -p "${TILELANG_CACHE_DIR}" "${TILELANG_TMP_DIR}" "${TRITON_CACHE_DIR}"

              # Validate GPU frequency
              TARGET_CLOCK_MHZ=1830
              RETRIES=5
              nvidia-smi -L
              for i in $(seq 1 $RETRIES); do
                gpu_clock=$(nvidia-smi --query-gpu=clocks.current.graphics --format=csv,noheader,nounits | xargs)
                echo "GPU clock: ${gpu_clock} MHz (attempt ${i}/${RETRIES})"
                if [ "$gpu_clock" = "$TARGET_CLOCK_MHZ" ]; then break; fi
                if [ "$i" -eq "$RETRIES" ]; then
                  echo "::error::GPU frequency validation failed. Expected ${TARGET_CLOCK_MHZ} MHz."
                  exit 1
                fi
                sleep 2
              done

              pip install build pytest

              echo "=== Build wheel package ==="
              python -m build --wheel
              echo "=== Build artifacts ==="
              ls -lh dist/*.whl

              echo "=== Install built wheel ==="
              pip install dist/*.whl

              TMP_TEST_DIR="$(mktemp -d)"
              cp -r tests "${TMP_TEST_DIR}/tests"
              cp pyproject.toml "${TMP_TEST_DIR}/"
              cd "${TMP_TEST_DIR}"

              echo "=== Runtime cache env ==="
              echo "TILELANG_CACHE_DIR=${TILELANG_CACHE_DIR:-}"
              echo "TILELANG_TMP_DIR=${TILELANG_TMP_DIR:-}"
              echo "TRITON_CACHE_DIR=${TRITON_CACHE_DIR:-}"

              echo "=== Run pytest packaging ==="
              python -m pytest -q tests/ops -m "packaging" \
                --junit-xml=/workspace/packaging_smoke.xml
            ' 2>&1 | tee packaging.log
        shell: bash

      - name: Upload wheel artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: tileops-wheel-${{ github.sha }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14

      - name: Upload packaging logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: packaging-logs-${{ github.sha }}
          path: |
            packaging.log
            packaging_smoke.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Publish wheel to GitHub Release (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          fail_on_unmatched_files: true
