# elementwise_unary_math.yaml -- manifest entries for unary math ops.
#
# Single-input single-output elementwise math ops: arithmetic (abs, neg,
# reciprocal, sign), exponential/log (exp, log, sqrt, rsqrt, log1p, expm1),
# trigonometric (sin, cos), rounding (floor, ceil, round, trunc), error
# functions (erf), saturating activations whose primary character is a
# smooth math function (sigmoid, tanh), bitwise/logical not, and predicate
# checks (isnan, isinf, isfinite). Source of truth for op interfaces in
# this family. Loaded and merged with other family files by tileops.manifest
# at runtime. See docs/design/manifest.md for the full schema.

ExpFwdOp:
  ref_api: "torch.exp"
  family: elementwise
  status: spec-only

  signature:
    inputs:
      input: {dtype: "float16 | bfloat16 | float32"}
    outputs:
      output: {dtype: "same_as(input)"}
    shape_rules:
      - "output.shape == input.shape"

  workloads:
    - {x_shape: [4096, 4096], dtypes: [float16, bfloat16, float32], label: "elementwise-16M"}
    - {x_shape: [16384, 16384], dtypes: [float16, bfloat16], label: "elementwise-256M"}

  roofline:
    vars:
      N: "product(input.shape)"
    flops: "N"
    bytes: "2 * N * elem_bytes"

  source:
    kernel: tileops/kernels/elementwise.py
    op: tileops/ops/elementwise.py
    test: tests/ops/test_unary_math.py
    bench: benchmarks/ops/bench_unary_elementwise.py
    bench_manifest_driven: false

