# Position-encoding operators.
#
# These ops already exist in tileops/ops/rope.py. The manifest keeps the
# current runtime surface as source of truth: construction binds RoPE variant
# config, while forward infers tensor dimensions from input metadata.

RopeNeoxOp:
  ref_api: "none"
  family: position_encoding
  status: implemented

  signature:
    inputs:
      x: {dtype: "float16 | bfloat16 | float32", shape: "[seq_len, head_dim] | [batch, seq_len, num_heads, head_dim]"}
    outputs:
      output: {dtype: "same_as(x)", shape: "same_as(x)"}
    params:
      layout: {type: str, default: "1d"}
      base: {type: float, default: 10000.0}
    shape_rules:
    - "layout == '1d' implies x.ndim == 2"
    - "layout == '2d' implies x.ndim == 4"
    - "x.shape[-1] % 2 == 0"

  workloads:
  - {seq_len: 2048, head_dim: 64, dtype: float16, layout: "1d", dtypes: [float16], label: "neox-1d-2k-d64-fp16"}
  - {seq_len: 4096, head_dim: 128, dtype: bfloat16, layout: "1d", dtypes: [bfloat16], label: "neox-1d-4k-d128-bf16"}
  - {batch: 2, seq_len: 2048, num_heads: 32, head_dim: 128, dtype: float16, layout: "2d", dtypes: [float16], label: "neox-2d-b2-s2k-h32-d128-fp16"}

  roofline:
    func: "tileops.perf.formulas.rope_roofline"

  source:
    kernel: tileops/kernels/rope.py
    kernel_map:
      rope_neox: RopeNeoxKernel
    op: tileops/ops/rope.py
    test: tests/ops/test_rope.py
    bench: benchmarks/ops/bench_rope.py
    bench_manifest_driven: false

