RopeNeoxPositionIdsOp:
  ref_api: "none"
  family: position_encoding
  status: implemented

  signature:
    inputs:
      x: {dtype: "float16 | bfloat16 | float32", shape: "[num_tokens, num_heads, head_dim]"}
      position_ids: {dtype: "int32 | int64", shape: "[num_tokens]"}
    outputs:
      output: {dtype: "same_as(x)", shape: "[num_tokens, num_heads, head_dim]"}
    params:
      max_position: {type: int}
      base: {type: float, default: 10000.0}
      rotary_dim: {type: "int | None", default: null}
    shape_rules:
    - "x.ndim == 3"
    - "position_ids.shape == (x.shape[0],)"
    - "x.shape[-1] % 2 == 0"
    - "rotary_dim is None or (rotary_dim > 0 and rotary_dim % 2 == 0 and rotary_dim <= x.shape[-1])"

  workloads:
  - {num_tokens: 2048, num_heads: 32, head_dim: 128, max_position: 4096, dtype: float16, dtypes: [float16], label: "position-ids-s2k-h32-d128-fp16"}
  - {num_tokens: 4096, num_heads: 32, head_dim: 128, max_position: 8192, dtype: bfloat16, dtypes: [bfloat16], label: "position-ids-s4k-h32-d128-bf16"}

  roofline:
    func: "tileops.perf.formulas.rope_position_ids_roofline"

  source:
    kernel: tileops/kernels/rope.py
    kernel_map:
      rope_neox_position_ids: RopeNeoxPositionIdsKernel
    op: tileops/ops/rope.py
    test: tests/ops/test_rope.py
    bench: benchmarks/ops/bench_rope.py
    bench_manifest_driven: false
