# linear_attention.yaml -- manifest entries for linear-attention operators.
#
# Source of truth for linear-attention op interfaces. Spec-only entries define
# the public Op contract before the implementation is wired up.

GatedDeltaNetPrefillFwdOp:
  # Inference prefill for Gated DeltaNet. This is intentionally separate from
  # GatedDeltaNetFwdOp, which exposes training-forward artifacts needed by
  # backward. Prefill returns only the prompt output and the recurrent state
  # consumed by decode.
  ref_api: "none"
  family: linear_attention
  status: implemented

  signature:
    inputs:
      q: {dtype: "float16 | bfloat16 | float32", shape: "[B, S, H, DK]"}
      k: {dtype: "same_as(q)", shape: "[B, S, H, DK]"}
      v: {dtype: "same_as(q)", shape: "[B, S, H, DV]"}
      g: {dtype: "same_as(q)", shape: "[B, S, H]"}
      beta: {dtype: "same_as(q)", shape: "[B, S, H]"}
    outputs:
      o: {dtype: "same_as(q)", shape: "[B, S, H, DV]"}
      final_state: {dtype: "same_as(q)", shape: "[B, H, DK, DV]"}
    params:
      chunk_size: {type: "int | None", default: null}
      layout: {type: str, default: "bthd"}
    shape_rules:
      - "layout in ('bhtd', 'bhsd', 'bthd')"
      - "layout == 'bthd' or q.shape == (B, H, S, DK)"
      - "layout == 'bthd' or k.shape == (B, H, S, DK)"
      - "layout == 'bthd' or v.shape == (B, H, S, DV)"
      - "layout == 'bthd' or g.shape == (B, H, S)"
      - "layout == 'bthd' or beta.shape == (B, H, S)"
      - "layout == 'bthd' or o.shape == (B, H, S, DV)"
      - "layout != 'bthd' or q.shape == (B, S, H, DK)"
      - "layout != 'bthd' or k.shape == (B, S, H, DK)"
      - "layout != 'bthd' or v.shape == (B, S, H, DV)"
      - "layout != 'bthd' or g.shape == (B, S, H)"
      - "layout != 'bthd' or beta.shape == (B, S, H)"
      - "layout != 'bthd' or o.shape == (B, S, H, DV)"
      - "final_state.shape == (B, H, DK, DV)"
      - "chunk_size is None or S % chunk_size == 0"

  workloads:
    # Small fallback row for environments without FLA. The benchmark uses the
    # pure-torch reference only up to S=4096; the long-context Qwen rows below
    # require FLA as their independent baseline.
    - {q_shape: [1, 4096, 16, 128], k_shape: [1, 4096, 16, 128], v_shape: [1, 4096, 16, 128], g_shape: [1, 4096, 16], beta_shape: [1, 4096, 16], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "fallback-gdn-prefill-b1-s4k-h16-d128-bthd"}

    # Qwen3.5-aligned inference prefill rows using the public FLA BTHD
    # contract. Tests use smaller branch-covering shapes in tests/ops; these
    # rows are intentionally long-context benchmark coverage.
    - {q_shape: [1, 32768, 16, 128], k_shape: [1, 32768, 16, 128], v_shape: [1, 32768, 16, 128], g_shape: [1, 32768, 16], beta_shape: [1, 32768, 16], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s32k-h16-d128-bthd"}
    - {q_shape: [1, 65536, 16, 128], k_shape: [1, 65536, 16, 128], v_shape: [1, 65536, 16, 128], g_shape: [1, 65536, 16], beta_shape: [1, 65536, 16], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s64k-h16-d128-bthd"}
    - {q_shape: [1, 131072, 16, 128], k_shape: [1, 131072, 16, 128], v_shape: [1, 131072, 16, 128], g_shape: [1, 131072, 16], beta_shape: [1, 131072, 16], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s128k-h16-d128-bthd"}
    - {q_shape: [1, 32768, 32, 128], k_shape: [1, 32768, 32, 128], v_shape: [1, 32768, 32, 128], g_shape: [1, 32768, 32], beta_shape: [1, 32768, 32], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s32k-h32-d128-bthd"}
    - {q_shape: [1, 65536, 32, 128], k_shape: [1, 65536, 32, 128], v_shape: [1, 65536, 32, 128], g_shape: [1, 65536, 32], beta_shape: [1, 65536, 32], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s64k-h32-d128-bthd"}
    - {q_shape: [1, 131072, 32, 128], k_shape: [1, 131072, 32, 128], v_shape: [1, 131072, 32, 128], g_shape: [1, 131072, 32], beta_shape: [1, 131072, 32], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s128k-h32-d128-bthd"}
    - {q_shape: [1, 32768, 48, 128], k_shape: [1, 32768, 48, 128], v_shape: [1, 32768, 48, 128], g_shape: [1, 32768, 48], beta_shape: [1, 32768, 48], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s32k-h48-d128-bthd"}
    - {q_shape: [1, 65536, 48, 128], k_shape: [1, 65536, 48, 128], v_shape: [1, 65536, 48, 128], g_shape: [1, 65536, 48], beta_shape: [1, 65536, 48], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s64k-h48-d128-bthd"}
    - {q_shape: [1, 131072, 48, 128], k_shape: [1, 131072, 48, 128], v_shape: [1, 131072, 48, 128], g_shape: [1, 131072, 48], beta_shape: [1, 131072, 48], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s128k-h48-d128-bthd"}
    - {q_shape: [1, 32768, 64, 128], k_shape: [1, 32768, 64, 128], v_shape: [1, 32768, 64, 128], g_shape: [1, 32768, 64], beta_shape: [1, 32768, 64], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s32k-h64-d128-bthd"}
    - {q_shape: [1, 65536, 64, 128], k_shape: [1, 65536, 64, 128], v_shape: [1, 65536, 64, 128], g_shape: [1, 65536, 64], beta_shape: [1, 65536, 64], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s64k-h64-d128-bthd"}
    - {q_shape: [1, 131072, 64, 128], k_shape: [1, 131072, 64, 128], v_shape: [1, 131072, 64, 128], g_shape: [1, 131072, 64], beta_shape: [1, 131072, 64], chunk_size: 64, layout: bthd, dtypes: [float16, bfloat16], label: "qwen35-gdn-prefill-b1-s128k-h64-d128-bthd"}

  roofline:
    func: "tileops.perf.formulas.gated_deltanet_prefill_fwd_roofline"

  source:
    kernel: tileops/kernels/gated_deltanet/gated_deltanet_prefill.py
    kernel_map:
      GatedDeltaNetPrefillFwdKernel: GatedDeltaNetPrefillFwdKernel
    op: tileops/ops/gated_deltanet.py
    test: tests/ops/test_gated_deltanet_prefill.py
    bench: benchmarks/ops/bench_gated_deltanet_prefill.py
    bench_manifest_driven: true

GatedDeltaNetDecodeOp:
  # Single-token serving decode. The input state is read-only from the public
  # contract perspective; the op returns a fresh new_state tensor.
  ref_api: "none"
  family: linear_attention
  status: implemented

  signature:
    inputs:
      q: {dtype: "float16 | bfloat16 | float32", shape: "[B, H, DK]"}
      k: {dtype: "same_as(q)", shape: "[B, H, DK]"}
      v: {dtype: "same_as(q)", shape: "[B, H, DV]"}
      g: {dtype: "same_as(q)", shape: "[B, H]"}
      beta: {dtype: "same_as(q)", shape: "[B, H]"}
      state: {dtype: "same_as(q)", shape: "[B, H, DK, DV]"}
    outputs:
      o: {dtype: "same_as(q)", shape: "[B, H, DV]"}
      new_state: {dtype: "same_as(q)", shape: "[B, H, DK, DV]"}
    params: {}
    shape_rules:
      - "q.shape == (B, H, DK)"
      - "k.shape == (B, H, DK)"
      - "v.shape == (B, H, DV)"
      - "g.shape == (B, H)"
      - "beta.shape == (B, H)"
      - "state.shape == (B, H, DK, DV)"
      - "o.shape == (B, H, DV)"
      - "new_state.shape == (B, H, DK, DV)"

  workloads:
    - {q_shape: [1, 4, 64], k_shape: [1, 4, 64], v_shape: [1, 4, 64], g_shape: [1, 4], beta_shape: [1, 4], state_shape: [1, 4, 64, 64], dtypes: [float16, bfloat16, float32], label: "gdn-decode-smoke-d64"}
    - {q_shape: [1, 32, 128], k_shape: [1, 32, 128], v_shape: [1, 32, 128], g_shape: [1, 32], beta_shape: [1, 32], state_shape: [1, 32, 128, 128], dtypes: [bfloat16, float32], label: "gdn-decode-b1-h32-d128"}
    - {q_shape: [8, 32, 128], k_shape: [8, 32, 128], v_shape: [8, 32, 128], g_shape: [8, 32], beta_shape: [8, 32], state_shape: [8, 32, 128, 128], dtypes: [bfloat16, float32], label: "gdn-decode-b8-h32-d128"}

  roofline:
    func: "tileops.perf.formulas.gated_deltanet_decode_roofline"

  source:
    kernel: tileops/kernels/gated_deltanet_recurrence.py
    kernel_map:
      GatedDeltaNetDecodeKernel: GatedDeltaNetDecodeKernel
      GatedDeltaNetDecodeFP32Kernel: GatedDeltaNetDecodeFP32Kernel
      GatedDeltaNetDecodeRawCudaFlaStyleKernel: GatedDeltaNetDecodeRawCudaFlaStyleKernel
    op: tileops/ops/gated_deltanet.py
    test: tests/ops/test_gated_deltanet_recurrence.py
    bench: benchmarks/ops/bench_gated_deltanet_recurrence.py
    bench_manifest_driven: true

DeltaNetDecodeOp:
  # Single-token ungated DeltaNet decode. Like GDN decode, state ownership is
  # functional: state is read and new_state is returned.
  ref_api: "none"
  family: linear_attention
  status: implemented

  signature:
    inputs:
      q: {dtype: "float16 | bfloat16 | float32", shape: "[B, H, DK]"}
      k: {dtype: "same_as(q)", shape: "[B, H, DK]"}
      v: {dtype: "same_as(q)", shape: "[B, H, DV]"}
      beta: {dtype: "same_as(q)", shape: "[B, H]"}
      state: {dtype: "same_as(q)", shape: "[B, H, DK, DV]"}
    outputs:
      o: {dtype: "same_as(q)", shape: "[B, H, DV]"}
      new_state: {dtype: "same_as(q)", shape: "[B, H, DK, DV]"}
    params: {}
    shape_rules:
      - "q.shape == (B, H, DK)"
      - "k.shape == (B, H, DK)"
      - "v.shape == (B, H, DV)"
      - "beta.shape == (B, H)"
      - "state.shape == (B, H, DK, DV)"
      - "o.shape == (B, H, DV)"
      - "new_state.shape == (B, H, DK, DV)"

  workloads:
    - {q_shape: [1, 4, 64], k_shape: [1, 4, 64], v_shape: [1, 4, 64], beta_shape: [1, 4], state_shape: [1, 4, 64, 64], dtypes: [float16, bfloat16, float32], label: "delta-decode-smoke-d64"}
