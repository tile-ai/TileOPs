GroupedQueryAttentionPrefillFwdOp:
  ref_api: "none"
  family: attention
  status: implemented

  signature:
    inputs:
      q: {dtype: "float16 | bfloat16"}
      k: {dtype: "same_as(q)"}
      v: {dtype: "same_as(q)"}
    outputs:
      o: {dtype: "same_as(q)"}
    params:
      is_causal: {type: bool, default: true}
      sm_scale: {type: float, default: null}
    shape_rules:
      - "q.shape == (B, S_q, H, D)"
      - "k.shape == (B, S_kv, H_kv, D)"
      - "v.shape == (B, S_kv, H_kv, D)"
      - "o.shape == (B, S_q, H, D)"
      - "H % H_kv == 0"
