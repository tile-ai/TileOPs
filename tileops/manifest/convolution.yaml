# convolution.yaml -- manifest entries for the 'convolution' family.
#
# Source of truth for op interfaces in this family. Loaded and merged with
# other family files by tileops.manifest at runtime. See docs/design/manifest.md
# for the full schema.

Conv1dFwdOp:
  ref_api: "torch.nn.functional.conv1d"
  # Equivalent to torch.nn.functional.conv1d (bias=None)
  family: convolution
  status: spec-only  # TODO: impl lacks dilation, groups, string padding

  signature:
    inputs:
      input: {dtype: "float32 | float16 | bfloat16", shape: "[N, C_in, L_in]"}
      weight: {dtype: "same_as(input)", shape: "[C_out, C_in_g, kW]"}
    outputs:
      output: {dtype: "same_as(input)", shape: "[N, C_out, L_out]"}
    params:
      stride: {type: "int | tuple[int]", default: 1}
      padding: {type: "int | tuple[int] | str", default: 0}
      dilation: {type: "int | tuple[int]", default: 1}
      groups: {type: int, default: 1}
    shape_rules:
      - "C_in % groups == 0"
      - "C_out % groups == 0"
      - "C_in_g == C_in // groups"
      # Normalize tuple params to scalar (conv1d tuples are always 1-element)
      - "_s == (stride[0] if isinstance(stride, (tuple, list)) else stride)"
      - "_p == (padding[0] if isinstance(padding, (tuple, list)) else padding)"
      - "_d == (dilation[0] if isinstance(dilation, (tuple, list)) else dilation)"
      # String padding validation
      - "not isinstance(_p, str) or _p in ('valid', 'same')"
      - "_p != 'same' or _s == 1"
      - "L_out == L_in if _p == 'same' else (L_in + 2 * (0 if _p == 'valid' else _p) - _d * (kW - 1) - 1) // _s + 1"

  # Workloads selected from three dominant Conv1d model families:
  #   Whisper (OpenAI ASR)  — https://huggingface.co/openai/whisper-large-v3
  #     src: transformers/models/whisper/modeling_whisper.py WhisperEncoder (nn.Conv1d)
  #   Wav2Vec2 (Meta ASR)   — https://huggingface.co/facebook/wav2vec2-base
  #     src: transformers/models/wav2vec2/modeling_wav2vec2.py Wav2Vec2NoLayerNormConvLayer (nn.Conv1d)
  #   EnCodec (Meta codec)  — https://huggingface.co/facebook/encodec_24khz
  #     src: transformers/models/encodec/modeling_encodec.py EncodecEncoder (EncodecConv1d → nn.Conv1d)
  # Selection criteria: cover small/large kernel, narrow/wide channels,
  #   short/long sequences, and different pipeline stages (entry vs deep layer).
  workloads:
    # Whisper-large encoder conv1: mel spectrogram → hidden (most common ASR entry point)
    - {input_shape: [1, 80, 3000], C_out: 1280, kW: 3, dtypes: [float16, bfloat16], label: "whisper-large-conv1"}
    # Wav2Vec2 feature extractor layer1: raw 1s waveform, large kernel + stride downsampling
    - {input_shape: [1, 1, 16000], C_out: 512, kW: 10, stride: 5, dtypes: [float16, bfloat16], label: "wav2vec2-layer1"}
    # EnCodec SEANet encoder init: raw 1s audio @24kHz, narrow channels
    - {input_shape: [1, 1, 24000], C_out: 32, kW: 7, dtypes: [float16, bfloat16], label: "encodec-init"}
    # EnCodec SEANet deep block: short sequence, wide channels, large kernel
    - {input_shape: [1, 128, 600], C_out: 256, kW: 10, dtypes: [float16, bfloat16], label: "encodec-deep"}

  roofline:
    flops: "2 * N * C_out * L_out * C_in_g * kW"
    bytes: "(N * C_in * L_in + C_out * C_in_g * kW + N * C_out * L_out) * elem_bytes"

  source:
    kernel: tileops/kernels/convolution.py
    kernel_map:
      conv1d_kernel: Conv1dKernel
    op: tileops/ops/convolution.py
    test: tests/ops/test_convolution.py
    bench: benchmarks/ops/bench_convolution.py
    bench_manifest_driven: false

Conv1dBiasFwdOp:
  ref_api: "torch.nn.functional.conv1d"
  # Equivalent to torch.nn.functional.conv1d (bias≠None)
  family: convolution
  status: spec-only  # TODO: impl lacks dilation, groups, string padding
  variant_of: Conv1dFwdOp

  signature:
    inputs:
      input: {dtype: "float32 | float16 | bfloat16", shape: "[N, C_in, L_in]"}
      weight: {dtype: "same_as(input)", shape: "[C_out, C_in_g, kW]"}
      bias: {dtype: "same_as(input)", shape: "[C_out]"}
    outputs:
      output: {dtype: "same_as(input)", shape: "[N, C_out, L_out]"}
    params:
      stride: {type: "int | tuple[int]", default: 1}
      padding: {type: "int | tuple[int] | str", default: 0}
      dilation: {type: "int | tuple[int]", default: 1}
      groups: {type: int, default: 1}
    shape_rules:
      - "C_in % groups == 0"
      - "C_out % groups == 0"
      - "C_in_g == C_in // groups"
      - "_s == (stride[0] if isinstance(stride, (tuple, list)) else stride)"
      - "_p == (padding[0] if isinstance(padding, (tuple, list)) else padding)"
      - "_d == (dilation[0] if isinstance(dilation, (tuple, list)) else dilation)"
      - "not isinstance(_p, str) or _p in ('valid', 'same')"
      - "_p != 'same' or _s == 1"
      - "L_out == L_in if _p == 'same' else (L_in + 2 * (0 if _p == 'valid' else _p) - _d * (kW - 1) - 1) // _s + 1"

  # Same shapes as conv1d_fwd; bias adds negligible memory traffic
  workloads:
    - {input_shape: [1, 80, 3000], C_out: 1280, kW: 3, dtypes: [float16, bfloat16], label: "whisper-large-conv1"}
    - {input_shape: [1, 1, 16000], C_out: 512, kW: 10, stride: 5, dtypes: [float16, bfloat16], label: "wav2vec2-layer1"}
    - {input_shape: [1, 1, 24000], C_out: 32, kW: 7, dtypes: [float16, bfloat16], label: "encodec-init"}
    - {input_shape: [1, 128, 600], C_out: 256, kW: 10, dtypes: [float16, bfloat16], label: "encodec-deep"}

  roofline:
    # bias adds one addition per output element
    flops: "2 * N * C_out * L_out * C_in_g * kW + N * C_out * L_out"
    bytes: "(N * C_in * L_in + C_out * C_in_g * kW + C_out + N * C_out * L_out) * elem_bytes"

  source:
    kernel: tileops/kernels/convolution.py
    kernel_map:
      conv1d_kernel: Conv1dKernel
    op: tileops/ops/convolution.py
    test: tests/ops/test_convolution.py
    bench: benchmarks/ops/bench_convolution.py
    bench_manifest_driven: false

Conv2dFwdOp:
  ref_api: "torch.nn.functional.conv2d"
  # Equivalent to torch.nn.functional.conv2d (bias=None)
  family: convolution
  status: spec-only  # TODO: impl lacks dilation, groups

  signature:
    inputs:
      input: {dtype: "float32 | float16 | bfloat16", shape: "[N, C_in, H, W]"}
      weight: {dtype: "same_as(input)", shape: "[C_out, C_in_g, kH, kW]"}
    outputs:
      output: {dtype: "same_as(input)", shape: "[N, C_out, out_H, out_W]"}
    params:
      stride: {type: "int | tuple[int, int]", default: 1}
      padding: {type: "int | tuple[int, int] | str", default: 0}
      dilation: {type: "int | tuple[int, int]", default: 1}  # TODO: not supported by kernel
      groups: {type: int, default: 1}  # TODO: not supported by kernel
    shape_rules:
      - "C_in % groups == 0"
      - "C_out % groups == 0"
      - "C_in_g == C_in // groups"
      - "_s_h == (stride[0] if isinstance(stride, (tuple, list)) else stride)"
      - "_s_w == (stride[1] if isinstance(stride, (tuple, list)) else stride)"
      - "_p_h == (padding[0] if isinstance(padding, (tuple, list)) else padding)"
      - "_p_w == (padding[1] if isinstance(padding, (tuple, list)) else padding)"
      - "_d_h == (dilation[0] if isinstance(dilation, (tuple, list)) else dilation)"
      - "_d_w == (dilation[1] if isinstance(dilation, (tuple, list)) else dilation)"
      - "not isinstance(_p_h, str) or _p_h in ('valid', 'same')"
      - "not isinstance(_p_w, str) or _p_w in ('valid', 'same')"
      - "_p_h != 'same' or _s_h == 1"
      - "_p_w != 'same' or _s_w == 1"
      - "out_H == H if _p_h == 'same' else (H + 2 * (0 if _p_h == 'valid' else _p_h) - _d_h * (kH - 1) - 1) // _s_h + 1"
      - "out_W == W if _p_w == 'same' else (W + 2 * (0 if _p_w == 'valid' else _p_w) - _d_w * (kW - 1) - 1) // _s_w + 1"

  workloads:
    - {input_shape: [2, 64, 56, 56], C_out: 64, kH: 3, kW: 3, stride: [1, 1], padding: [1, 1], dtypes: [float16, bfloat16], label: "resnet-3x3-fp16"}
    - {input_shape: [1, 3, 112, 112], C_out: 64, kH: 3, kW: 3, stride: [2, 2], padding: [1, 1], dtypes: [float16], label: "stem-3x3-s2-fp16"}
    - {input_shape: [1, 128, 56, 56], C_out: 256, kH: 3, kW: 3, stride: [2, 2], padding: [1, 1], dtypes: [float16], label: "stage-transition-3x3-s2-fp16"}
    - {input_shape: [1, 256, 112, 112], C_out: 512, kH: 3, kW: 3, stride: [1, 1], padding: [1, 1], dtypes: [float16], label: "highres-3x3-s1-fp16"}
    - {input_shape: [1, 64, 56, 56], C_out: 128, kH: 5, kW: 5, stride: [1, 1], padding: [2, 2], dtypes: [float16], label: "midres-5x5-s1-fp16"}
    - {input_shape: [1, 128, 56, 56], C_out: 256, kH: 5, kW: 5, stride: [2, 2], padding: [2, 2], dtypes: [float16], label: "stage-transition-5x5-s2-fp16"}
    - {input_shape: [1, 128, 28, 28], C_out: 128, kH: 3, kW: 3, stride: [2, 2], padding: [1, 1], dtypes: [bfloat16], label: "stride2-bf16"}
    - {input_shape: [2, 64, 56, 56], C_out: 256, kH: 1, kW: 1, stride: [1, 1], padding: [0, 0], dtypes: [float16, bfloat16], label: "resnet-1x1-fp16"}
    - {input_shape: [2, 128, 28, 28], C_out: 512, kH: 1, kW: 1, stride: [1, 1], padding: [0, 0], dtypes: [float16], label: "bottleneck-expand-1x1-fp16"}
    - {input_shape: [2, 512, 28, 28], C_out: 128, kH: 1, kW: 1, stride: [1, 1], padding: [0, 0], dtypes: [float16], label: "bottleneck-reduce-1x1-fp16"}
    - {input_shape: [1, 256, 14, 14], C_out: 1024, kH: 1, kW: 1, stride: [1, 1], padding: [0, 0], dtypes: [float16], label: "late-stage-1x1-fp16"}
    - {input_shape: [1, 512, 7, 7], C_out: 2048, kH: 1, kW: 1, stride: [1, 1], padding: [0, 0], dtypes: [float16], label: "classifier-1x1-fp16"}
    - {input_shape: [2, 64, 56, 56], C_out: 256, kH: 1, kW: 1, stride: [1, 1], padding: [0, 0], dtypes: [bfloat16], label: "resnet-1x1-bf16"}

  roofline:
    flops: "2 * N * C_out * out_H * out_W * C_in * kH * kW"
    bytes: "(N * C_in * H * W + C_out * C_in * kH * kW + N * C_out * out_H * out_W) * elem_bytes"

  source:
    kernel: tileops/kernels/convolution.py
    kernel_map:
      conv2d_kernel: Conv2dKernel
      conv2d_1x1_kernel: Conv2d1x1Kernel
    op: tileops/ops/convolution.py
    test: tests/ops/test_convolution.py
    bench: benchmarks/ops/bench_convolution.py
    bench_manifest_driven: false

