# Miscellaneous mature sequence-modeling operators with existing runtime,
# tests, and benchmarks.

EngramGateConvFwdOp:
  ref_api: "none"
  family: sequence_modeling
  status: implemented

  signature:
    inputs:
      H: {dtype: "float16 | bfloat16", shape: "[M, seq_len, d]"}
      k: {dtype: "same_as(H)", shape: "[M, seq_len, d]"}
      v: {dtype: "same_as(H)", shape: "[M, seq_len, d]"}
      rms_w_h: {dtype: "same_as(H)", shape: "[d]"}
      rms_w_v: {dtype: "same_as(H)", shape: "[d]"}
      conv_w: {dtype: "same_as(H)", shape: "[4, d]"}
    outputs:
      Y: {dtype: "same_as(H)", shape: "[M, seq_len, d]"}
      vhat: {dtype: "same_as(H)", shape: "[M, seq_len, d]"}
      alpha: {dtype: "float32", shape: "[M, seq_len]"}
      rrms_h: {dtype: "float32", shape: "[M, seq_len]"}
      rrms_k: {dtype: "float32", shape: "[M, seq_len]"}
      rrms_v: {dtype: "float32", shape: "[M, seq_len]"}
    params:
      M: {type: int}
      seq_len: {type: int}
      d: {type: int}
      dtype: {type: torch.dtype}
      eps: {type: float, default: 1.0e-6}
    shape_rules:
    - "H.shape == (M, seq_len, d)"
    - "k.shape == H.shape"
    - "v.shape == H.shape"
    - "rms_w_h.shape == (d,)"
    - "rms_w_v.shape == (d,)"
    - "conv_w.shape == (4, d)"

  workloads:
  # d is kept 256-aligned so runtime padding does not distort roofline.
  - {M: 1, seq_len: 32, d: 256, dtype: float16, dtypes: [float16], label: "fwd-b1-s32-d256-fp16"}
  - {M: 2, seq_len: 64, d: 512, dtype: float16, dtypes: [float16], label: "fwd-b2-s64-d512-fp16"}
  - {M: 1, seq_len: 128, d: 256, dtype: bfloat16, dtypes: [bfloat16], label: "fwd-b1-s128-d256-bf16"}

  roofline:
    func: "tileops.perf.formulas.engram_gate_conv_fwd_roofline"

  source:
    kernel: tileops/kernels/engram/engram_fwd.py
    kernel_map:
      engram_gate_conv_fwd: EngramGateConvFwdKernel
    op: tileops/ops/engram.py
    test: tests/ops/test_engram.py
    bench: benchmarks/ops/bench_engram.py
    bench_manifest_driven: false

EngramGateConvBwdOp:
  ref_api: "none"
  family: sequence_modeling
  status: implemented

  signature:
    inputs:
      dY: {dtype: "float16 | bfloat16", shape: "[M, seq_len, d]"}
      H: {dtype: "same_as(dY)", shape: "[M, seq_len, d]"}
      k: {dtype: "same_as(dY)", shape: "[M, seq_len, d]"}
      v: {dtype: "same_as(dY)", shape: "[M, seq_len, d]"}
      rms_w_h: {dtype: "same_as(dY)", shape: "[d]"}
      rms_w_v: {dtype: "same_as(dY)", shape: "[d]"}
      conv_w: {dtype: "same_as(dY)", shape: "[4, d]"}
      vhat: {dtype: "same_as(dY)", shape: "[M, seq_len, d]"}
      alpha: {dtype: "float32", shape: "[M, seq_len]"}
      rrms_h: {dtype: "float32", shape: "[M, seq_len]"}
      rrms_k: {dtype: "float32", shape: "[M, seq_len]"}
      rrms_v: {dtype: "float32", shape: "[M, seq_len]"}
    outputs:
      dH: {dtype: "same_as(dY)", shape: "[M, seq_len, d]"}
      dk: {dtype: "same_as(dY)", shape: "[M, seq_len, d]"}
      dv: {dtype: "same_as(dY)", shape: "[M, seq_len, d]"}
      drms_w_h: {dtype: "float32", shape: "[d]"}
      drms_w_v: {dtype: "float32", shape: "[d]"}
      dconv_w: {dtype: "float32", shape: "[4, d]"}
    params:
      M: {type: int}
      seq_len: {type: int}
      d: {type: int}
      dtype: {type: torch.dtype}
      eps: {type: float, default: 1.0e-6}
    shape_rules:
    - "dY.shape == (M, seq_len, d)"
    - "H.shape == dY.shape"
    - "k.shape == dY.shape"
    - "v.shape == dY.shape"
    - "vhat.shape == dY.shape"
    - "alpha.shape == (M, seq_len)"
    - "rrms_h.shape == (M, seq_len)"
    - "rrms_k.shape == (M, seq_len)"
    - "rrms_v.shape == (M, seq_len)"
    - "conv_w.shape == (4, d)"

  workloads:
  - {M: 1, seq_len: 32, d: 256, dtype: float16, dtypes: [float16], label: "bwd-b1-s32-d256-fp16"}
  - {M: 2, seq_len: 64, d: 512, dtype: float16, dtypes: [float16], label: "bwd-b2-s64-d512-fp16"}
  - {M: 1, seq_len: 128, d: 256, dtype: bfloat16, dtypes: [bfloat16], label: "bwd-b1-s128-d256-bf16"}

  roofline:
    func: "tileops.perf.formulas.engram_gate_conv_bwd_roofline"

  source:
    kernel: tileops/kernels/engram/engram_bwd.py
    kernel_map:
      engram_gate_conv_bwd: EngramGateConvBwdKernel
    op: tileops/ops/engram.py
    test: tests/ops/test_engram.py
    bench: benchmarks/ops/bench_engram.py
    bench_manifest_driven: false

EngramDecodeOp:
  ref_api: "none"
  family: sequence_modeling
  status: implemented

  signature:
    inputs:
      e_t: {dtype: "float16 | bfloat16", shape: "[batch, d_mem]"}
      h_t: {dtype: "same_as(e_t)", shape: "[batch, d]"}
      conv_state: {dtype: "same_as(e_t)", shape: "[batch, max_conv_len, d]"}
      W_K: {dtype: "same_as(e_t)", shape: "[d_mem, d]"}
      W_V: {dtype: "same_as(e_t)", shape: "[d_mem, d]"}
      rms_w_h: {dtype: "same_as(e_t)", shape: "[d]"}
      rms_w_v: {dtype: "same_as(e_t)", shape: "[d]"}
      conv_w: {dtype: "same_as(e_t)", shape: "[conv_kernel_size, d]"}
    outputs:
      y_t: {dtype: "same_as(e_t)", shape: "[batch, d]"}
      new_conv_state: {dtype: "same_as(e_t)", shape: "[batch, max_conv_len, d]"}
    params:
      batch: {type: int}
      d_mem: {type: int}
      d: {type: int}
      max_conv_len: {type: int}
      conv_kernel_size: {type: int}
      dilation: {type: int}
      dtype: {type: torch.dtype}
      eps: {type: float, default: 1.0e-6}
    shape_rules:
    - "e_t.shape == (batch, d_mem)"
    - "h_t.shape == (batch, d)"
    - "conv_state.shape == (batch, max_conv_len, d)"
    - "W_K.shape == (d_mem, d)"
    - "W_V.shape == (d_mem, d)"
    - "conv_w.shape == (conv_kernel_size, d)"
    - "d % 256 == 0"

  workloads:
  - {batch: 1, d_mem: 512, d: 256, max_conv_len: 12, conv_kernel_size: 4, dilation: 3, dtype: float16, dtypes: [float16], label: "decode-b1-dmem512-d256-fp16"}
  - {batch: 4, d_mem: 1024, d: 512, max_conv_len: 20, conv_kernel_size: 4, dilation: 5, dtype: float16, dtypes: [float16], label: "decode-b4-dmem1024-d512-fp16"}
  - {batch: 8, d_mem: 512, d: 256, max_conv_len: 18, conv_kernel_size: 4, dilation: 3, dtype: bfloat16, dtypes: [bfloat16], label: "decode-b8-dmem512-d256-bf16"}

  roofline:
    func: "tileops.perf.formulas.engram_decode_roofline"

  source:
    kernel: tileops/kernels/engram/engram_decode.py
    kernel_map:
      engram_decode: EngramDecodeKernel
    op: tileops/ops/engram_decode.py
    test: tests/ops/test_engram.py
    bench: benchmarks/ops/bench_engram.py
    bench_manifest_driven: false

FFTC2COp:
  ref_api: "torch.fft.fft"
  family: spectral
  status: implemented

  signature:
    inputs:
      x: {dtype: "complex64 | complex128", shape: "[..., n]"}
    outputs:
      output: {dtype: "same_as(x)", shape: "same_as(x)"}
    shape_rules:
    - "x.shape[-1] > 0"
    - "x.shape[-1] & (x.shape[-1] - 1) == 0"

  workloads:
  - {input_shape: [4096], dtypes: [complex64], label: "fft-4k-c64-unbatched"}
  - {input_shape: [64, 4096], dtypes: [complex64], label: "fft-4k-c64-b64"}
  - {input_shape: [64, 4096], dtypes: [complex128], label: "fft-4k-c128-b64"}

  roofline:
    func: "tileops.perf.formulas.fft_c2c_roofline"

  source:
    kernel: tileops/kernels/fft.py
    kernel_map:
      fft_c2c_kernel: FFTC2CKernel
    op: tileops/ops/fft.py
    test: tests/ops/test_fft.py
    bench: benchmarks/ops/bench_fft.py
    bench_manifest_driven: true

MHCPreOp:
  ref_api: "none"
  family: sequence_modeling
  status: implemented

  signature:
    inputs:
      phi: {dtype: "float32", shape: "[n_expand * c_x, n_expand * n_expand + 2 * n_expand]"}
      x: {dtype: "bfloat16", shape: "[batch, n_expand * c_x]"}
      b: {dtype: "float32", shape: "[n_expand * n_expand + 2 * n_expand]"}
    outputs:
      x_res: {dtype: "bfloat16", shape: "[batch, n_expand * c_x]"}
      x_layer: {dtype: "bfloat16", shape: "[batch, c_x]"}
    params:
      alpha_pre: {type: float}
      alpha_post: {type: float}
      alpha_res: {type: float}
      sinkhorn_repeat: {type: int}
      sinkhorn_eps: {type: float, default: 0.02}
    shape_rules:
    - "phi.ndim == 2 and x.ndim == 2 and b.ndim == 1"
    - "phi.shape[0] == x.shape[1]"
    - "b.shape[0] == phi.shape[1]"
    - "exists n_expand > 0 such that phi.shape[1] == n_expand * n_expand + 2 * n_expand"
    - "x.shape[1] % n_expand == 0"

  workloads:
  - {batch: 1, n_expand: 4, c_x: 1280, alpha_pre: 1.0, alpha_post: 1.0, alpha_res: 1.0, sinkhorn_repeat: 1, dtype: bfloat16, dtypes: [bfloat16], label: "pre-small"}
  - {batch: 2, n_expand: 4, c_x: 1920, alpha_pre: 1.0, alpha_post: 1.0, alpha_res: 1.0, sinkhorn_repeat: 1, dtype: bfloat16, dtypes: [bfloat16], label: "pre-medium"}
  - {batch: 4, n_expand: 4, c_x: 2560, alpha_pre: 1.0, alpha_post: 1.0, alpha_res: 1.0, sinkhorn_repeat: 1, dtype: bfloat16, dtypes: [bfloat16], label: "pre-large"}

  roofline:
    func: "tileops.perf.formulas.mhc_pre_roofline"

  source:
    kernel: tileops/kernels/mhc/mhc_pre.py
    kernel_map:
      mhc_pre_kernel: MHCPreKernel
    op: tileops/ops/mhc.py
    test: tests/ops/test_mhc_pre.py
    bench: benchmarks/ops/bench_mhc_pre.py
    bench_manifest_driven: false

MHCPostOp:
  ref_api: "none"
  family: sequence_modeling
  status: implemented

  signature:
    inputs:
      x_layer_out: {dtype: "bfloat16", shape: "[batch, c_x]"}
      h_post: {dtype: "float32", shape: "[batch, n_expand]"}
      x_res: {dtype: "bfloat16", shape: "[batch, n_expand * c_x]"}
    outputs:
      x_out: {dtype: "bfloat16", shape: "[batch, n_expand * c_x]"}
    shape_rules:
    - "x_layer_out.ndim == 2 and h_post.ndim == 2 and x_res.ndim == 2"
    - "h_post.shape[0] == x_layer_out.shape[0]"
    - "x_res.shape[0] == x_layer_out.shape[0]"
    - "x_res.shape[1] == h_post.shape[1] * x_layer_out.shape[1]"

  workloads:
  - {batch: 1, n_expand: 4, c_x: 1280, dtype: bfloat16, dtypes: [bfloat16], label: "post-small"}
  - {batch: 2, n_expand: 4, c_x: 1920, dtype: bfloat16, dtypes: [bfloat16], label: "post-medium"}
  - {batch: 4, n_expand: 4, c_x: 2560, dtype: bfloat16, dtypes: [bfloat16], label: "post-large"}

  roofline:
    func: "tileops.perf.formulas.mhc_post_roofline"

  source:
    kernel: tileops/kernels/mhc/mhc_post.py
    kernel_map:
      mhc_post_kernel: MHCPostKernel
    op: tileops/ops/mhc.py
    test: tests/ops/test_mhc_post.py
    bench: benchmarks/ops/bench_mhc_post.py
    bench_manifest_driven: false
