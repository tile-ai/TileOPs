  # ---------------------------------------------------------------------------
  # reduction -- vector norms (output dtype: same_as(x))
  # ---------------------------------------------------------------------------

  l1_norm_fwd:
    family: reduction
    status: implemented

    signature:
      inputs:
        x: {dtype: "float16 | bfloat16 | float32"}
      outputs:
        y: {dtype: "same_as(x)"}
      params:
        dim: {type: "int | list[int] | None", default: -1}
        keepdim: {type: bool, default: false}
      shape_rules:
        - "y.ndim == x.ndim if keepdim else x.ndim - (x.ndim if dim is None else len([dim] if isinstance(dim, int) else dim))"
        - "y.shape[i] == (1 if i in (range(x.ndim) if dim is None else ([dim % x.ndim] if isinstance(dim, int) else [d % x.ndim for d in dim])) and keepdim else x.shape[i])"

    workloads:
      # Hidden state L1 norm (Llama-3.1-8B)
      - {x_shape: [2048, 4096], dtypes: [float16, bfloat16], label: "hidden-state-l1"}
      # Long sequence L1 norm
      - {x_shape: [64, 32768], dtypes: [bfloat16], label: "long-seq-l1"}

    roofline:
      vars:
        M: "product(x.shape[i] for i in range(x.ndim) if (i not in (range(x.ndim) if dim is None else ([d % x.ndim for d in dim] if isinstance(dim, list) else [dim % x.ndim]))))"
        N: "product(x.shape[i] for i in (range(x.ndim) if dim is None else ([d % x.ndim for d in dim] if isinstance(dim, list) else [dim % x.ndim]))))"
      # abs + add per element
      flops: "2 * M * N"
      # Read x + write y
      bytes: "(M * N + M) * elem_bytes"

    source:
      kernel: tileops/kernels/reduction/vector_norm/fwd.py
      op: tileops/ops/reduction/l1_norm.py
      test: tests/ops/test_vector_norm.py
      bench: benchmarks/ops/bench_vector_norm.py

