      vars:
        M: "1 if dim is None else product(x.shape[:dim % x.ndim]) * product(x.shape[dim % x.ndim + 1:])"
        N: "product(x.shape) if dim is None else x.shape[dim % x.ndim]"
      # N-1 comparisons per output element
