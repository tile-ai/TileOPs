      - {x_shape: [64, 32768], dtypes: [bfloat16], label: "long-seq-scan"}

    roofline:
      vars:
        M: "product(x.shape[:dim % x.ndim]) * product(x.shape[dim % x.ndim + 1:])"
        N: "x.shape[dim % x.ndim]"
      # N-1 additions per scan line
      flops: "M * N"
      # Read x + write y
