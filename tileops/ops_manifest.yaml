  cumsum_fwd:
    family: scan
    status: spec-only

    signature:
      inputs:
        x: {dtype: "float16 | bfloat16 | float32"}
      outputs:
        y: {dtype: "same_as(x)"}
      params:
        dim: {type: int, default: -1}
      shape_rules:
